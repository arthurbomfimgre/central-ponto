const LS_FLAG_CONTA_TESTE = "cp_conta_teste_ativa";
function contaTesteAtiva() {

}
function ativarContaTeste() {
  salvarLS(LS_FLAG_CONTA_TESTE, true);
}
function desativarContaTeste() {
  try { localStorage.removeItem(LS_FLAG_CONTA_TESTE); } catch (_e) {}
}

// Fallback localStorage
function lerLS(key, fb) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fb; } catch (_e) { return fb; }
}
function salvarLS(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch (_e) {}
}

// Comprime/redimensiona uma imagem (foto do EasyMob) antes de enviar ao
// Supabase. Fotos de celular sem compressão chegam a vários MB em base64,
// o que pode falhar silenciosamente ao salvar (timeout, payload grande
// demais) — o print "parecia" enviado no aparelho do funcionário, mas nunca
// chegava ao banco para o admin ver. Reduzir para no máximo 1280px no lado
// maior e comprimir como JPEG resolve isso, mantendo a foto legível.
// Extrai uma mensagem de erro segura (sempre string) a partir de qualquer
// formato de erro que o Supabase ou o navegador possam lançar. Necessário
// porque erros HTTP 500 do GoTrue (Auth) às vezes chegam como objetos sem
// `.message` legível, ou até como erros de rede genéricos — sem essa
// blindagem com `typeof` explícito, um objeto podia acabar sendo passado
// como children de um elemento React, que então renderizava literalmente
// "{}" na tela em vez de um texto compreensível para o usuário.
function extrairMensagemErro(err) {
  if (typeof err === "string" && err) return err;
  if (err && typeof err === "object") {
    const candidatos = [err.message, err.error_description, err.msg, err.error, err.statusText];
    for (const c of candidatos) {
      if (typeof c === "string" && c) return c;
    }
    if (typeof err.status === "number" && err.status > 0) {
      return `Erro no servidor (código ${err.status}). Tente novamente em alguns minutos.`;
    }
  }
  return "Não foi possível concluir a operação. Tente novamente.";
}

function comprimirImagem(dataUrl, maxLado = 1280, qualidade = 0.75) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxLado || height > maxLado) {
        const escala = maxLado / Math.max(width, height);
        width = Math.round(width * escala);
        height = Math.round(height * escala);
      }
      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL("image/jpeg", qualidade));
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

// Ler do Supabase (retorna array de objetos ou valor easymob)
async function lerSupa(key, fb) {
  try {
    const table = KEY_TABLE[key];
    if (!table) return fb;
    // A chave real usada pelo app para o mapa de prints do EasyMob tem o
    // sufixo "_map" (ex: "cp_easymob_v4_map") — precisa ser tratada do mesmo
    // jeito que SK_EASYMOB (chave/valor simples), senão cai no ramo de baixo
    // que espera um array com campo `id`, formato incompatível com a tabela.
    if (key === SK_EASYMOB || key === `${SK_EASYMOB}_map`) {
      const { data } = await supa.from(table).select("*");
      if (!data || data.length === 0) return fb;
      // easymob armazena chave/valor simples
      const obj = {};
      data.forEach(r => { obj[r.chave] = r.data; });
      return obj;
    }
    const { data } = await supa.from(table).select("data");
    if (!data || data.length === 0) return fb;
    const result = data.map(r => r.data);
    _cache[key] = result;
    salvarLS(key, result);
    return result;
  } catch (_e) {
    return _cache[key] ?? lerLS(key, fb);
  }
}

// Salvar no Supabase (substitui todos os registros da tabela).
// Retorna { ok: true } ou { ok: false, erro } — o chamador decide o que
// fazer com a falha (ex: avisar o usuário). Antes, qualquer erro era
// engolido em silêncio e a interface sempre mostrava "salvo com sucesso",
// mesmo quando o dado nunca chegava ao banco (ex: print do EasyMob).
async function salvarSupa(key, val) {
  try {
    _cache[key] = val;
    salvarLS(key, val); // cache local imediato
    const table = KEY_TABLE[key];
    if (!table) return { ok: true };

    // Mesma correção: a chave real usada pelo app tem o sufixo "_map" (ex:
    // "cp_easymob_v4_map") e precisa ser tratada como objeto chave->valor,
    // igual SK_EASYMOB — senão caía no ramo de array por engano (ou, antes
    // da correção do KEY_TABLE, nem chegava a entrar aqui).
    if (key === SK_EASYMOB || key === `${SK_EASYMOB}_map`) {
      // easymob é um objeto chave->valor
      if (typeof val !== "object" || !val) return { ok: true };
      for (const [chave, dado] of Object.entries(val)) {
        // .select() força o Supabase a retornar a linha realmente gravada —
        // sem isso, um upsert bloqueado silenciosamente por RLS pode não
        // reportar `error` algum, mas também não persistir nada, fazendo a
        // UI achar que deu certo quando na verdade não salvou.
        const { data: linhaSalva, error } = await supa.from(table).upsert({ chave, data: dado }, { onConflict: "chave" }).select();
        if (error) {
          console.error("[EASYMOB UPSERT ERROR]", { chave, tamanhoDado: dado?.length, error });
          return { ok: false, erro: error.message };
        }
        if (!linhaSalva || linhaSalva.length === 0) {
          console.error("[EASYMOB UPSERT SEM RETORNO]", { chave, tamanhoDado: dado?.length });
          return { ok: false, erro: "O registro não foi confirmado pelo banco (possível bloqueio de permissão)." };
        }
      }
      return { ok: true };
    }

    // Para listas: upsert cada item pelo id
    if (!Array.isArray(val)) return { ok: true };
    if (val.length === 0) {
      await supa.from(table).delete().neq("id", -999999);
      return { ok: true };
    }
    const rows = val.map(item => ({ id: item.id, data: item }));
    const { error: errUpsert } = await supa.from(table).upsert(rows, { onConflict: "id" });
    if (errUpsert) return { ok: false, erro: errUpsert.message };

    // Remove ids que não existem mais
    const ids = val.map(i => i.id);
    await supa.from(table).delete().not("id", "in", "(" + ids.join(",") + ")");
    return { ok: true };
  } catch (e) {
    // Falha de rede/inesperada — já salvou no localStorage como fallback,
    // mas o chamador precisa saber que não sincronizou com o banco.
    console.error("[SALVARSUPA EXCEPTION]", { key, error: e });
    return { ok: false, erro: e?.message || "Falha de conexão" };
  }
}

// Hook principal — carrega do Supabase, mantém sincronia via polling
function useSharedState(key, initial) {
  // Conta de teste: nunca lê nem grava no Supabase. Todo o estado fica
  // isolado sob uma chave própria no localStorage ("cp_teste_<key>"),
  // começando vazio ([]/{} conforme o tipo do `initial`, nunca os dados
  // reais de seed) e persistindo só nesse dispositivo entre login/logout.
  const chaveTeste = `cp_teste_${key}`;
  const vazio = Array.isArray(initial) ? [] : (initial && typeof initial === "object" ? {} : initial);

  const [state, setRaw] = useState(() => {
    if (contaTesteAtiva()) return lerLS(chaveTeste, vazio);
    return _cache[key] ?? lerLS(key, initial);
  });
  const loaded = useRef(false);

  // Carga inicial do Supabase — pulada inteiramente em modo teste
  useEffect(() => {
    if (contaTesteAtiva()) return;
    lerSupa(key, initial).then(val => {
      if (val !== null && val !== undefined) {
        setRaw(val);
        loaded.current = true;
      }
    });
  }, [key]);

  // Polling a cada 3s para sincronizar entre dispositivos — desligado em modo teste
  useEffect(() => {
    if (contaTesteAtiva()) return;
    const id = setInterval(async () => {
      const fresh = await lerSupa(key, null);
      if (fresh !== null && fresh !== undefined) {
        setRaw(prev => {
          const ps = JSON.stringify(prev), fs = JSON.stringify(fresh);
          return ps !== fs ? fresh : prev;
        });
      }
    }, 3000);
    return () => clearInterval(id);
  }, [key]);

  const setState = useCallback(valOrFn => {
    let next;
    setRaw(prev => {
      next = typeof valOrFn === "function" ? valOrFn(prev) : valOrFn;
      return next;
    });
    if (contaTesteAtiva()) {
      // Grava só localmente, isolado da chave real — nunca chama o Supabase.
      return Promise.resolve().then(() => {
        salvarLS(chaveTeste, next);
        return { ok: true };
      });
    }
    // Retorna a Promise do salvamento — chamadores que precisam confirmar
    // sucesso (ex: upload de print do EasyMob) podem usar `await`; os demais
    // continuam funcionando normalmente ao ignorar o retorno.
    return Promise.resolve().then(() => salvarSupa(key, next));
  }, [key]);

  return [state, setState];
}

// Hook de tema — preferência local por dispositivo (não sincroniza entre usuários)
function useTheme() {
  const [theme, setTheme] = useState(() => lerLS("cp_tema", "light"));

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
    salvarLS("cp_tema", theme);
  }, [theme]);

  const toggleTheme = useCallback(() => {
    setTheme(prev => prev === "dark" ? "light" : "dark");
  }, []);

  return [theme, toggleTheme];
}

// ── Boot ─────────────────────────────────────────────────────────────────────
(function () {
  var loading = document.getElementById('loading');
  var errBox  = document.getElementById('error-box');
  var errDetail = document.getElementById('error-detail');

  function hideLoading() {
    if (loading) {
      loading.classList.add('hide');
      setTimeout(function() { if (loading) loading.style.display = 'none'; }, 450);
    }
  }

  function showError(msg) {
    hideLoading();
    if (errDetail) errDetail.textContent = String(msg);
    if (errBox) errBox.classList.add('show');
  }

  // Verifica CDNs
  if (typeof React === 'undefined' || typeof ReactDOM === 'undefined' || typeof ReactDOM.createRoot === 'undefined') {
    showError('CDN nao carregado: React=' + (typeof React) + ' ReactDOM=' + (typeof ReactDOM) + ' Supabase=' + (typeof window.supabase));
    return;
  }

  try {
    var root = document.getElementById('root');
    ReactDOM.createRoot(root).render(React.createElement(App));
    // Remove loading apos dois frames (React ja pintou na tela)
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        hideLoading();
      });
    });
  } catch(err) {
    showError(err && (err.stack || err.message || String(err)));
  }
})();
</script>
