// ─── STORAGE COMPARTILHADO (sincronização em tempo real entre abas) ───────────
const SK_OCS = "cp_ocorrencias_v4";
const SK_FUNCS = "cp_funcionarios_v4";
const SK_EASYMOB = "cp_easymob_v4";
const SK_NOTIFS = "cp_notifs_v4";
const SK_RECADOS = "cp_recados_v4";
function lerLS(key, fb) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fb;
  } catch {
    return fb;
  }
}
function salvarLS(key, val) {
  try {
    localStorage.setItem(key, JSON.stringify(val));
  } catch {}
}
function useSharedState(key, initial) {
  const [state, setRaw] = useState(() => lerLS(key, initial));
  useEffect(() => {
    function onStorage(e) {
      if (e.key === key) {
        try {
          setRaw(JSON.parse(e.newValue));
        } catch {}
      }
    }
    window.addEventListener("storage", onStorage);
    return () => window.removeEventListener("storage", onStorage);
  }, [key]);
  useEffect(() => {
    const id = setInterval(() => {
      const fresh = lerLS(key, null);
      if (fresh !== null) setRaw(prev => {
        const ps = JSON.stringify(prev),
          fs = JSON.stringify(fresh);
        return ps !== fs ? fresh : prev;
      });
    }, 200);
    return () => clearInterval(id);
  }, [key]);
  const setState = useCallback(valOrFn => {
    setRaw(prev => {
      const next = typeof valOrFn === "function" ? valOrFn(prev) : valOrFn;
      salvarLS(key, next);
      return next;
    });
  }, [key]);
  return [state, setState];
}
